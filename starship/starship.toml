"$schema" = "https://starship.rs/config-schema.json"

format = """
[о‚¶](#a3aed2)\
$os\
[о‚ґ](bg:#769ff0 fg:#a3aed2)\
$username\
[о‚ґ](fg:#769ff0 bg:#394260)\
$directory\
[о‚ґ](fg:#394260 bg:#212736)\
$time\
[о‚ґ ](fg:#1d2230)\
\n$character"""

[os]
disabled = false
style = "bg:#a3aed2 fg:#212736"

[os.symbols]
Windows = "оњЏ"
Macos = "п…№"
Linux = "пЊћ"

[username]
show_always = true
style_user = "bg:#769ff0 fg:#212736"
style_root = "bg:#769ff0 fg:#212736"
format = '[ $user ]($style)'

[directory]
style = "fg:#769ff0 bg:#394260"
format = "[ $path ]($style)"
truncation_length = 5
truncation_symbol = "вЂ¦/"

[time]
disabled = false
time_format = "%R"
style = "bg:#1d2230"
format = '[[ пђє $time ](fg:#a0a9cb bg:#1d2230)]($style)'
